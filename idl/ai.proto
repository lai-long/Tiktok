syntax="proto3";
package ai;
option go_package="ai";


message GLMReq{
  string model=1;
  bool stream=2;
  double temperature=3;
  repeated ChatMessage messages=4;
}
message ChatMessage{
  string role=1;
  string content=2;
  string reasoning_content=3;
}

message GLMResp{
  repeated Choice choices=1;
  int64 created =2;
  string model=3;
  string object=4;
  Usage usage=5;
}
message Choice{
  string finish_reason=1;
  int64 index=2;
  ChatMessage message=3;
}
message Usage{
    int64 completion_tokens=1;
    int64 prompt_tokens=2;
    int64 total_tokens=3;
}

message AiChatReq{
  string content=1;
}
message AiChatResp{
  string content=1;
  string reason_content=2;
  int64 token=3;
}