
syntax="proto3";
package websocket;
option go_package="chat";
import "api.proto";
import "common.proto";
message SendMsg{
  string Type=1[(api.go_tag)="json:\"type\""];
  string Content=2[(api.go_tag)="json:\"content\""];
  string GroupId=3[(api.go_tag)="json:\"group_id\""];
  string PageNum=4[(api.go_tag)="json:\"page_num\""];
  string PageSize=5[(api.go_tag)="json:\"page_size\""];
}
message ReplyMsg{
  string From=1 [(api.go_tag)="json:\"from\""];
  int32 Code=2  [(api.go_tag)="json:\"code\""];
  string Content=3[(api.go_tag)="json:\"content\""];
}

message WebsocketReq{
  string ToUserId=1[(api.body)="to_user_id"];
  string GroupId=2[(api.body)="group_id"];
  int64 PageNum=3[(api.body)="page_num"];
  int64 PageSize=4[(api.body)="page_size"];
}
message WebsocketResp{
  common.Base Base=1[(api.go_tag)="json:\"base\""];
}