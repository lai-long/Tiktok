
syntax="proto3";
package comment;
option go_package="react";
import "api.proto";
import "common.proto";
message CommentInfo{
  string UserId=1[(api.go_tag)="json:\"user_id\""];
  string TargetId=2[(api.go_tag)="json:\"target_id\""];
  string CommentId=3[(api.go_tag)="json:\"comment_id\""];
  string Content=4[(api.go_tag)="json:\"content\""];
  int64 LikeCount=5[(api.go_tag)="json:\"like_count\" "];
  string CreatedAt=6[(api.go_tag)="json:\"created_at\""];
  string UpdatedAt=7[(api.go_tag)="json:\"updated_at\" "];
  string DeletedAt=8[(api.go_tag)="json:\"deleted_at\""];
  string TargetType=9[(api.go_tag)="json:\"target_type\" "];
  int64 CommentCount=10[(api.go_tag)="json:\"comment_count\""];
}

message CommentPublishReq{
  string TargetAt=1[(api.body)="target_id"];
  string TargetType=2[(api.body)="target_type"];
  string Content=3[(api.body)="content"];
}
message CommentPublishResp{
  common.Base base=1[(api.go_tag)="json:\"base\""];
}

message CommentListReq{
  string TargetAt=1[(api.body)="target_id"];
  string PageSize=2[(api.body)="page_size"];
  string PageNum=3[(api.body)="page_num"];
}
message CommentListResp{
  common.Base Base=1[(api.go_tag)="json:\"base\""];
  repeated CommentInfo items=2[(api.go_tag)="json:\"items\""];
}

message CommentDeleteReq{
  string CommentId=1[(api.body)="comment_id"];
  string TargetAt=2[(api.body)="target_id"];
  string TargetType=3[(api.body)="target_type"];
}
message CommentDeleteResp{
  common.Base base=1[(api.go_tag)="json:\"base\""];
}

message LikeActionReq{
  string TargetAt=1[(api.body)="target_id"];
  string TargetType=2[(api.body)="target_type"];
  string ActionType=3[(api.body)="action_type"];
}
message LikeActionResp{
  common.Base base=1[(api.go_tag)="json:\"base\""];
}

message LikeListReq{
  string UserId=1[(api.body)="user_id"];
  string PageNum=2[(api.body)="page_num"];
  string PageSize=3[(api.body)="page_size"];
}
message LikeListResp{
  common.Base base=1[(api.go_tag)="json:\"base\""];
}