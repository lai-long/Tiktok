
syntax="proto3";
package comment;
option go_package="react";
import "api.proto";
import "common.proto";
message CommentInfo{
  string UserId=1[(api.go_tag)="json:\"user_id\" form:\"user_id\""];
  string TargetId=2[(api.go_tag)="json:\"target_id\" form:\"target_id\""];
  string CommentId=3[(api.go_tag)="json:\"comment_id\" form:\"comment_id\""];
  string Content=4[(api.go_tag)="json:\"content\" form:\"content\""];
  int64 LikeCount=5[(api.go_tag)="json:\"like_count\" form:\"like_count\""];
  string CreatedAt=6[(api.go_tag)="json:\"created_at\" form:\"created_at\""];
  string UpdatedAt=7[(api.go_tag)="json:\"updated_at\" form:\"updated_at\""];
  string DeletedAt=8[(api.go_tag)="json:\"deleted_at\" form:\"deleted_at\""];
  string TargetType=9[(api.go_tag)="json:\"target_type\" form:\"target_type\""];
  int64 CommentCount=10[(api.go_tag)="json:\"comment_count\" form:\"comment_count\""];
}

message CommentPublishReq{
  string TargetAt=1[(api.body)="target_id"];
  string TargetType=2[(api.body)="target_type"];
  string Content=3[(api.body)="content"];
}
message CommentPublishResp{
  common.Base base=1[(api.go_tag)="json:\"base\""];
}

message CommentListReq{
  string TargetAt=1[(api.body)="target_id"];
  string PageSize=2[(api.body)="page_size"];
  string PageNum=3[(api.body)="page_num"];
}
message CommentListResp{
  common.Base Base=1[(api.go_tag)="json:\"base\""];
  repeated CommentInfo items=2[(api.go_tag)="json:\"items\""];
}