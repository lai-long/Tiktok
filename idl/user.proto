syntax="proto3";
package user;
option go_package="user";
import "api.proto";
import "common.proto";
message UserInfo{
   string ID = 1[(api.go_tag)="json:\"id\""];
   string Username=2[(api.go_tag)="json:\"username\""];
   string AvatarURL=3[(api.go_tag)="json:\"avatar_url\""];
   string CreatedAt=4[(api.go_tag)="json:\"created_at\""];
   string UpdatedAt=5[(api.go_tag)="json:\"updated_at\""];
   string DeletedAt=6[(api.go_tag)="json:\"deleted_at\""];
}



message RegisterReq{
   string UserName=1[(api.body)="username",(api.vd)="required,min=1,max=20"];
   string Password=2[(api.body)="password",(api.vd)="required,min=5,max=20"];
}
message RegisterResp{
   common.Base Base=1[(api.go_tag)="json:\"base\""];
}

message LoginReq{
   string UserName=1[(api.body)="username",(api.vd)="required,min=1,max=20"];
   string Password=2[(api.body)="password",(api.vd)="required,min=5,max=20"];
   string Code=3[(api.body)="code"];
}
message LoginResp{
   common.Base Base=1[(api.go_tag)="json:\"base\""];
   UserInfo data=2[(api.go_tag)="json:\"data\""];
   string RefreshToken=3[(api.go_tag)="json:\"refresh_token\""];
   string AccessToken=4[(api.go_tag)="json:\"access_token\""];
}

message UserInfoReq{
   string UserId=1[(api.body)="user_id",(api.vd)="required"];
}
message UserInfoResp{
   common.Base Base=1[(api.go_tag)="json:\"base\""];
   UserInfo Data=2[(api.go_tag)="json:\"data\""];
}

message UserAvatarReq{
}
message UserAvatarResp{
   common.Base Base=1[(api.go_tag)="json:\"base\""];
   UserInfo data=2[(api.go_tag)="json:\"data\""];
}

message RefreshTokenReq{
   string RefreshToken=1[(api.body)="refresh_token"];
}
message RefreshTokenResp{
   common.Base Base=1[(api.go_tag)="json:\"base\""];
   string RefreshToken=2[(api.go_tag)="json:\"refresh_token\""];
   string AccessToken=3[(api.go_tag)="json:\"access_token\""];
}

message AuthReq{
   string AccessToken=1[(api.header)="Access-Token"];
}
message AuthResp{
   common.Base Base=1[(api.body)="base"];
}
service UserService{
   rpc UserRegister(RegisterReq) returns(RegisterResp){
      option(api.post) = "/user/register";
   }
   rpc UserLogin(LoginReq) returns(LoginResp){
      option(api.post) = "/user/login";
   }
   rpc UserInfo(UserInfoReq)returns(UserInfoResp){
      option(api.get) = "/user/info";
   }
   rpc UserAvatar(UserAvatarReq)returns(UserAvatarResp){
      option(api.put) = "/user/avatar/upload";
   }
   rpc RefreshToken(RefreshTokenReq)returns(RefreshTokenResp){
      option(api.post)="/user/refresh";
   }
}
