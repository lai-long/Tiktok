version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    - gocritic
    - lll
    - prealloc
    - errorlint
    - exhaustive
    - nilerr
    - nestif
    - nakedret
    - interfacebloat
    - durationcheck
#    - revive
  settings:
    lll:
      line-length: 150

issues:
  exclude-use-default: false
  max-issues-per-linter: 1000
  max-same-issues: 500

  exclude-files:
    - "third_party/*.go"

output:
  format: colored-line-number
  print-issued-line: true
  print-linter-name: true

